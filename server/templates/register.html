<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Email OTP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2196F3 0%, #1976D2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
        }

        .nav-back {
            display: inline-block;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            margin-bottom: 20px;
            transition: background 0.3s;
        }

        .nav-back:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .card h2 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .card .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 25px;
            font-size: 0.95em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #2196F3;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn:hover {
            background: #1976D2;
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
        }

        .step-dot {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            margin: 0 5px;
            transition: background 0.3s;
        }

        .step-dot.active {
            background: #2196F3;
        }

        .step-dot.done {
            background: #4CAF50;
        }

        .step-line {
            width: 50px;
            height: 2px;
            background: #ddd;
            align-self: center;
            transition: background 0.3s;
        }

        .step-line.done {
            background: #4CAF50;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            text-align: center;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .step-content {
            display: none;
        }

        .step-content.active {
            display: block;
        }

        .console-output {
            background: #1e1e1e;
            color: #4ec9b0;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            margin-top: 15px;
            white-space: pre-wrap;
            max-height: 200px;
            overflow-y: auto;
        }

        .console-label {
            color: #666;
            font-size: 0.85em;
            margin-top: 10px;
            margin-bottom: 5px;
        }
    </style>
</head>

<body>
    <div class="container">
        <a href="/" class="nav-back">← Quay lại Dashboard</a>

        <div class="card">
            <h2>📧 Đăng ký tài khoản</h2>
            <p class="subtitle">Xác thực OTP qua Email (Mô phỏng Social Engineering)</p>

            <div class="step-indicator">
                <div class="step-dot active" id="dot1">1</div>
                <div class="step-line" id="line1"></div>
                <div class="step-dot" id="dot2">2</div>
                <div class="step-line" id="line2"></div>
                <div class="step-dot" id="dot3">3</div>
            </div>

            <!-- Bước 1: Nhập thông tin -->
            <div class="step-content active" id="step1Content">
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="regEmail" placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label>Mật khẩu:</label>
                    <input type="password" id="regPassword" placeholder="Nhập mật khẩu">
                </div>
                <button class="btn" onclick="sendOTP()">Gửi OTP qua Email</button>
            </div>

            <!-- Bước 2: Nhập OTP -->
            <div class="step-content" id="step2Content">
                <p style="color: #666; margin-bottom: 15px;">
                    📨 Một email chứa mã OTP đã được gửi đến <strong id="emailDisplay"></strong>
                </p>
                <div class="form-group">
                    <label>Nhập mã OTP:</label>
                    <input type="text" id="otpInput" placeholder="Nhập 6 chữ số OTP" maxlength="6">
                </div>
                <button class="btn" onclick="verifyOTP()">Xác minh & Đăng ký</button>
                <button class="btn" style="background: #666; margin-top: 10px;" onclick="resendOTP()">Gửi lại
                    OTP</button>
            </div>

            <!-- Bước 3: Thành công -->
            <div class="step-content" id="step3Content">
                <div style="text-align: center; padding: 30px;">
                    <div style="font-size: 4em;">✅</div>
                    <h3 style="color: #4CAF50; margin: 15px 0;">Đăng ký thành công!</h3>
                    <p style="color: #666;">
                        Tài khoản <strong id="registeredEmail"></strong> đã được tạo.
                    </p>
                    <a href="/login" class="btn"
                        style="display: inline-block; width: auto; margin-top: 20px; text-decoration: none;">Đi đến Đăng
                        nhập</a>
                </div>
            </div>

            <div id="messageBox" class="message"></div>

            <div class="console-label">📟 Console Output (giả lập email):</div>
            <div class="console-output" id="consoleOutput">
                Đang chờ thao tác...
            </div>
        </div>
    </div>

    <script>
        let currentEmail = '';

        async function sendOTP() {
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            if (!email || !password) {
                showMessage('Vui lòng nhập đầy đủ thông tin!', 'error');
                return;
            }

            try {
                const res = await fetch('/api/register/send-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (data.success) {
                    currentEmail = email;
                    document.getElementById('emailDisplay').textContent = email;

                    // Chuyển sang bước 2
                    document.getElementById('step1Content').classList.remove('active');
                    document.getElementById('step2Content').classList.add('active');
                    document.getElementById('dot1').classList.add('done');
                    document.getElementById('dot2').classList.add('active');
                    document.getElementById('line1').classList.add('done');

                    // Hiển thị console output
                    document.getElementById('consoleOutput').textContent =
                        `📧 GIẢ LẬP GỬI EMAIL\n` +
                        `Đến: ${email}\n` +
                        `Tiêu đề: Xác thực đăng ký tài khoản\n` +
                        `Nội dung: Mã OTP của bạn là: ${data.data.otp_debug}\n` +
                        `Mã OTP có hiệu lực trong 5 phút.\n` +
                        `────────────────────────────────\n` +
                        `⚠️  Trong demo này, OTP được hiển thị để dễ test.\n` +
                        `Trong thực tế, attacker phải lừa victim đọc OTP.`;

                    showMessage(data.message, 'success');
                } else {
                    showMessage(data.message, 'error');
                }
            } catch (e) {
                console.error('Lỗi:', e);
                showMessage('Lỗi kết nối server!', 'error');
            }
        }

        async function verifyOTP() {
            const otp = document.getElementById('otpInput').value;

            if (!otp || otp.length < 4) {
                showMessage('Vui lòng nhập mã OTP!', 'error');
                return;
            }

            try {
                const res = await fetch('/api/register/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: currentEmail, otp })
                });
                const data = await res.json();

                if (data.success) {
                    // Chuyển sang bước 3
                    document.getElementById('step2Content').classList.remove('active');
                    document.getElementById('step3Content').classList.add('active');
                    document.getElementById('dot2').classList.add('done');
                    document.getElementById('dot3').classList.add('active');
                    document.getElementById('line2').classList.add('done');

                    document.getElementById('registeredEmail').textContent = currentEmail;

                    document.getElementById('consoleOutput').textContent +=
                        `\n✅ XÁC MINH OTP THÀNH CÔNG\n` +
                        `Tài khoản ${currentEmail} đã được tạo.\n` +
                        `────────────────────────────────\n` +
                        `🎯 SOCIAL ENGINEERING ANGLE:\n` +
                        `Attacker đã lừa victim cung cấp OTP\n` +
                        `để chiếm quyền đăng ký tài khoản.`;

                    showMessage(data.message, 'success');
                } else {
                    showMessage(data.message, 'error');
                }
            } catch (e) {
                console.error('Lỗi:', e);
            }
        }

        async function resendOTP() {
            await sendOTP();
        }

        function showMessage(msg, type) {
            const box = document.getElementById('messageBox');
            box.textContent = msg;
            box.className = 'message ' + type;
            setTimeout(() => { box.className = 'message'; }, 5000);
        }
    </script>
</body>

</html>
